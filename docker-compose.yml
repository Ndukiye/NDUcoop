services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nducoop
      POSTGRES_USER: nducoop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nducoop}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker-default:
    build: ./backend
    command: celery -A config worker -Q default -l info
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes:
      - media:/app/media
    depends_on:
      - db
      - redis

  worker-reports:
    build: ./backend
    command: celery -A config worker -Q reports -l info -c 2
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes:
      - media:/app/media
    depends_on:
      - db
      - redis

  beat:
    build: ./backend
    command: celery -A config beat -l info
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/static:ro
      - media:/media:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  pgdata:
  media:
  static:
